<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>esthyj - Profile</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif;
      background: #0f0f1a;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .container {
      text-align: center;
      max-width: 560px;
      padding: 40px 24px;
    }

    .avatar {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366f1, #a855f7, #ec4899);
      margin: 0 auto 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 48px;
      font-weight: 700;
      color: #fff;
      box-shadow: 0 0 40px rgba(99, 102, 241, 0.3);
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 8px;
      color: #fff;
    }

    .tagline {
      font-size: 1.05rem;
      color: #a0a0b8;
      margin-bottom: 32px;
      line-height: 1.6;
    }

    .tags {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      margin-bottom: 36px;
    }

    .tag {
      background: rgba(99, 102, 241, 0.12);
      border: 1px solid rgba(99, 102, 241, 0.25);
      color: #a5b4fc;
      padding: 6px 16px;
      border-radius: 20px;
      font-size: 0.85rem;
    }

    .links {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .links a {
      display: block;
      padding: 14px 20px;
      border-radius: 12px;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.08);
      color: #e0e0e0;
      text-decoration: none;
      font-size: 0.95rem;
      transition: all 0.2s ease;
    }

    .links a:hover {
      background: rgba(99, 102, 241, 0.15);
      border-color: rgba(99, 102, 241, 0.3);
      transform: translateY(-2px);
    }

    footer {
      margin-top: 48px;
      font-size: 0.8rem;
      color: #555;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="avatar">E</div>
    <h1>esthyj</h1>
    <p class="tagline">Hello! Welcome to my page.</p>

    <div class="tags">
      <span class="tag">Developer</span>
      <span class="tag">Student</span>
      <span class="tag">Creative</span>
    </div>

    <div class="links">
      <a href="https://github.com/esthyj" target="_blank">GitHub</a>
    </div>

    <footer>&copy; 2026 esthyj</footer>
  </div>
</body>
</html>
